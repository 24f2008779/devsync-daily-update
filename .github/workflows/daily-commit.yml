name: Daily Repository Update

on:
  schedule:
    - cron: '23 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update log 24f2008779@ds.study.iitm.ac.in
        run: |
          echo "Last update: $(date -u)" >> devsync-log.txt

      - name: Commit and push
        run: |
          git config user.name "DevSync Bot"
          git config user.email "24f2008779@ds.study.iitm.ac.in"
          git add devsync-log.txt
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily automated update $(date -u)"
            git push
          fi
