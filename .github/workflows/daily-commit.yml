name: Daily Repository Update

on:
  schedule:
    - cron: '23 4 * * *'
  workflow_dispatch:

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update log 24f2008779@ds.study.iitm.ac.in
        run: |
          echo "Last update: $(date -u)" >> devsync-log.txt

      - name: Commit changes
        run: |
          git config user.name "DevSync Bot"
          git config user.email "24f2008779@ds.study.iitm.ac.in"
          git add devsync-log.txt
          git commit -m "Daily automated update $(date -u)" || echo "No changes"
          git push
